<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>9th Monthsary 💕</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF6EE;
    --screen-bg:#FFE9F1;
    --screen-bg-2:#F4E9FF;
    --shell:#F7C9DC;
    --shell-dark:#E398B9;
    --accent-rose:#E0507A;
    --accent-rose-dark:#B83A5E;
    --accent-lavender:#B49FD8;
    --text-dark:#4A2C4D;
    --text-cream:#FFF6EE;
    --gold:#FFD66B;
    --line:#3D2A4A;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:linear-gradient(135deg,#FFE3EE 0%,#F3E6FF 55%,#E6F0FF 100%);
    font-family:'VT323',monospace;
    color:var(--text-dark);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 12px;
    overflow-x:hidden;
    position:relative;
  }

  .pixel{ image-rendering:pixelated; }

  /* ---------- floating bg hearts ---------- */
  #bg-hearts{
    position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0;
  }
  .bg-heart{
    position:absolute; bottom:-60px; opacity:0;
    animation:floatUp linear infinite;
  }
  @keyframes floatUp{
    0%{ transform:translateY(0) translateX(0) rotate(0deg); opacity:0; }
    8%{ opacity:.55; }
    85%{ opacity:.35; }
    100%{ transform:translateY(-115vh) translateX(var(--drift,30px)) rotate(20deg); opacity:0; }
  }

  /* ---------- pixel grid sprite engine ---------- */
  .pixel-grid{ display:grid; }
  .pixel-grid > div{ width:100%; height:100%; }

  /* ---------- console shell ---------- */
  .console{
    position:relative; z-index:1;
    width:100%; max-width:430px;
    background:linear-gradient(180deg,var(--shell) 0%, var(--shell-dark) 100%);
    border-radius:34px;
    padding:18px 16px 14px;
    box-shadow:0 18px 0 -6px rgba(74,44,77,.25), 0 24px 40px rgba(74,44,77,.35), inset 0 2px 0 rgba(255,255,255,.5);
  }
  .shell-top{
    display:flex; align-items:center; justify-content:space-between;
    padding:0 6px 12px;
  }
  .brand{
    font-family:'Press Start 2P',monospace; font-size:10px; color:var(--text-cream);
    letter-spacing:1px; text-shadow:2px 2px 0 var(--accent-rose-dark);
  }
  .icon-btn{
    background:var(--text-dark); border:none; width:30px; height:30px; border-radius:8px;
    font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow:0 3px 0 rgba(0,0,0,.25);
  }
  .icon-btn:active{ transform:translateY(2px); box-shadow:none; }

  .screen-frame{
    position:relative;
    background:var(--line);
    border-radius:18px;
    padding:10px;
    box-shadow:inset 0 0 0 3px rgba(0,0,0,.15);
  }
  .status-bar{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--line); color:var(--gold);
    font-family:'Press Start 2P',monospace; font-size:9px;
    padding:6px 8px; border-radius:8px 8px 0 0;
    letter-spacing:1px;
  }
  #heartBeat{ display:inline-block; animation:beat 1.1s ease-in-out infinite; }
  @keyframes beat{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.3);} }

  .screen{
    position:relative;
    background:linear-gradient(180deg,var(--screen-bg) 0%, var(--screen-bg-2) 100%);
    min-height:430px;
    overflow:hidden;
    padding:16px 14px 14px;
  }
  .scanlines{
    position:absolute; inset:0; pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(74,44,77,.05) 0px, rgba(74,44,77,.05) 1px, transparent 1px, transparent 3px);
  }

  .screen-panel{ display:none; animation:fadeIn .25s ease; }
  .screen-panel.active{ display:block; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  /* ---------- typography helpers ---------- */
  .pix-title{ font-family:'Press Start 2P',monospace; line-height:1.6; color:var(--accent-rose-dark); text-shadow:2px 2px 0 #fff; }
  .pix-label{ font-family:'Press Start 2P',monospace; font-size:9px; color:var(--text-dark); letter-spacing:.5px; }
  .vt{ font-family:'VT323',monospace; }

  /* ---------- pixel button ---------- */
  .pix-btn{
    font-family:'Press Start 2P',monospace; font-size:10px; color:#fff;
    background:var(--accent-rose); border:3px solid var(--line);
    padding:10px 12px; cursor:pointer; box-shadow:3px 3px 0 var(--line);
    border-radius:0; transition:transform .05s;
  }
  .pix-btn:active{ transform:translate(3px,3px); box-shadow:none; }
  .pix-btn.secondary{ background:var(--accent-lavender); }
  .pix-btn.ghost{ background:var(--cream); color:var(--text-dark); }
  .pix-btn.small{ font-size:9px; padding:7px 9px; box-shadow:2px 2px 0 var(--line); }
  .pix-btn:disabled{ opacity:.5; cursor:default; }

  /* ===================== HOME ===================== */
  #screen-home{ text-align:center; }
  .home-title{ font-size:13px; margin:6px 0 4px; }
  .home-sub{ font-size:20px; margin:0 0 10px; color:var(--accent-rose-dark); }

  .mascot-scene{
    position:relative; height:150px; margin:6px 0 10px;
    display:flex; align-items:flex-end; justify-content:center; gap:18px;
  }
  .mascot{ position:relative; animation:bob 2.2s ease-in-out infinite; }
  .mascot.her{ animation-delay:.3s; }
  .sparkle{ position:absolute; top:18px; left:50%; transform:translateX(-50%); font-size:18px; animation:twinkle 1.4s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-8px);} }
  @keyframes twinkle{ 0%,100%{ opacity:.25; transform:translateX(-50%) scale(.85);} 50%{ opacity:1; transform:translateX(-50%) scale(1.1);} }

  .lcd{
    display:inline-block; background:var(--line); color:#9CFFC1;
    font-family:'Press Start 2P',monospace; font-size:16px;
    padding:10px 16px; border-radius:6px; letter-spacing:2px;
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.4);
  }
  .since-text{ font-size:16px; margin-top:6px; color:var(--text-dark); }
  .stat-row{ display:flex; justify-content:center; gap:10px; margin-top:14px; flex-wrap:wrap; }
  .stat-chip{
    background:#fff; border:2px solid var(--line); padding:6px 10px;
    font-size:14px; box-shadow:2px 2px 0 var(--line);
  }
  .stat-chip b{ font-family:'Press Start 2P',monospace; font-size:11px; display:block; color:var(--accent-rose-dark); }

  /* ===================== MUSIC ===================== */
  .boombox{ width:100%; max-width:260px; margin:0 auto 14px; background:var(--line); border-radius:10px; padding:12px; position:relative; }
  .bb-handle{ width:60px; height:10px; background:var(--line); border-radius:6px 6px 0 0; margin:-20px auto 6px; }
  .bb-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .bb-speaker{ width:46px; height:46px; border-radius:50%; background:radial-gradient(circle, #7a6088 0%, #3D2A4A 70%); box-shadow:inset 0 0 0 4px #261a2c; }
  .bb-window{ flex:1; height:30px; background:repeating-linear-gradient(90deg,#6b4f74 0 4px, #5a4263 4px 8px); border-radius:4px; box-shadow:inset 0 0 0 3px #1f1424; position:relative; overflow:hidden; }
  .eq{ position:absolute; inset:0; display:flex; align-items:flex-end; justify-content:center; gap:3px; padding-bottom:5px; }
  .eq span{ width:4px; background:var(--gold); height:4px; animation:eqBounce 1s ease-in-out infinite; }
  .eq span:nth-child(2){ animation-delay:.15s; } .eq span:nth-child(3){ animation-delay:.3s; } .eq span:nth-child(4){ animation-delay:.45s; } .eq span:nth-child(5){ animation-delay:.6s; }
  @keyframes eqBounce{ 0%,100%{ height:4px;} 50%{ height:20px;} }
  .eq.paused span{ animation-play-state:paused; height:4px !important; }

  .now-playing{ text-align:center; font-size:15px; margin:8px 0; min-height:20px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 8px; }
  .player-controls{ display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:10px; }
  .ctrl-btn{ background:var(--accent-lavender); border:3px solid var(--line); width:38px; height:38px; font-size:14px; cursor:pointer; box-shadow:2px 2px 0 var(--line); }
  .ctrl-btn:active{ transform:translate(2px,2px); box-shadow:none; }
  .ctrl-btn.play{ background:var(--accent-rose); color:#fff; width:46px; height:46px; font-size:16px; }
  .vol-row{ display:flex; align-items:center; gap:6px; justify-content:center; margin-bottom:12px; font-size:14px; }
  .vol-row input[type=range]{ width:110px; accent-color:var(--accent-rose); }

  .add-row{ text-align:center; margin-bottom:10px; }
  .playlist{ list-style:none; margin:0; padding:0; max-height:140px; overflow-y:auto; border:2px solid var(--line); background:#fff; }
  .playlist li{ display:flex; align-items:center; gap:8px; padding:7px 8px; font-size:15px; border-bottom:2px dashed #e9c9d6; cursor:pointer; }
  .playlist li:last-child{ border-bottom:none; }
  .playlist li.playing{ background:var(--screen-bg); color:var(--accent-rose-dark); font-weight:bold; }
  .playlist li span.t{ flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .playlist li button{ background:none; border:none; cursor:pointer; font-size:14px; opacity:.7; }
  .empty-state{ text-align:center; font-size:15px; padding:20px 10px; color:#8a6b8f; }

  /* ===================== ALBUMS ===================== */
  .album-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-top:8px; }
  .album-card{
    position:relative; background:#fff; border:2px solid var(--line); padding:14px 8px 10px;
    text-align:center; cursor:pointer; box-shadow:3px 3px 0 var(--line);
  }
  .album-card::before{
    content:''; position:absolute; top:-8px; left:8px; width:34px; height:8px; background:#fff; border:2px solid var(--line); border-bottom:none;
  }
  .album-card .emo{ font-size:26px; }
  .album-card .nm{ font-size:15px; display:block; margin-top:4px; }
  .album-card .ct{ font-size:12px; color:#a07ba6; }
  .album-card.new{ border-style:dashed; color:var(--accent-rose-dark); display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:84px; box-shadow:none; }
  .album-del{
    position:absolute; top:4px; right:4px; background:#fff; border:2px solid var(--line);
    width:22px; height:22px; font-size:11px; cursor:pointer; line-height:1; padding:0;
    display:flex; align-items:center; justify-content:center; box-shadow:1px 1px 0 var(--line);
  }

  .album-detail-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .photo-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:10px; }
  .photo-thumb{ position:relative; background:#fff; padding:5px 5px 14px; border:2px solid var(--line); box-shadow:2px 2px 0 var(--line); cursor:pointer; transition:transform .15s; }
  .photo-thumb img{ width:100%; aspect-ratio:1/1; object-fit:cover; display:block; }
  .photo-thumb:hover{ transform:scale(1.05) rotate(0deg) !important; z-index:2; }

  /* ===================== LETTER ===================== */
  .parchment{
    background:#FFFBF1; border:3px solid var(--line); padding:16px 14px; position:relative;
    box-shadow:3px 3px 0 var(--line);
  }
  .seal{ position:absolute; top:-14px; right:14px; font-size:26px; filter:drop-shadow(1px 2px 0 var(--line)); }
  #letterText{
    width:100%; min-height:220px; resize:vertical; border:none; outline:none; background:transparent;
    font-family:'VT323',monospace; font-size:18px; line-height:1.5; color:var(--text-dark);
  }
  .letter-foot{ display:flex; justify-content:space-between; margin-top:8px; }

  /* ===================== TAB NAV ===================== */
  .tab-nav{ display:flex; justify-content:space-between; gap:6px; margin-top:14px; padding:0 4px; }
  .tab-btn{
    flex:1; background:var(--cream); border:2px solid var(--line); padding:8px 2px 6px; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:2px; box-shadow:2px 2px 0 var(--line); font-size:18px;
  }
  .tab-btn span{ font-family:'Press Start 2P',monospace; font-size:7px; color:var(--text-dark); }
  .tab-btn.active{ background:var(--accent-rose); }
  .tab-btn.active span{ color:#fff; }
  .tab-btn:active{ transform:translate(2px,2px); box-shadow:none; }

  /* ===================== MODALS / TOAST ===================== */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(61,42,74,.55); display:flex; align-items:center; justify-content:center;
    z-index:50; padding:16px;
  }
  .modal-overlay.hidden{ display:none; }
  .modal-box{
    background:var(--cream); border:3px solid var(--line); padding:18px; width:100%; max-width:320px;
    box-shadow:5px 5px 0 var(--line);
  }
  .modal-box h3{ font-family:'Press Start 2P',monospace; font-size:12px; margin:0 0 14px; color:var(--accent-rose-dark); }
  .field{ margin-bottom:12px; }
  .field label{ display:block; font-size:14px; margin-bottom:3px; color:#7a5c7f; }
  .field input[type=text], .field input[type=date]{
    width:100%; font-family:'VT323',monospace; font-size:17px; padding:7px 8px; border:2px solid var(--line); background:#fff;
  }
  .emoji-pick{ display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
  .emoji-pick button{ font-size:18px; background:#fff; border:2px solid var(--line); padding:4px 7px; cursor:pointer; }
  .emoji-pick button.sel{ background:var(--accent-lavender); }
  .modal-actions{ display:flex; justify-content:flex-end; gap:8px; margin-top:14px; }

  #lightbox .modal-box{ max-width:90vw; background:transparent; border:none; box-shadow:none; padding:0; text-align:center; }
  #lightbox img{ max-width:90vw; max-height:65vh; border:4px solid #fff; box-shadow:0 8px 24px rgba(0,0,0,.4); }
  .lb-controls{ display:flex; justify-content:center; gap:10px; margin-top:12px; }

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--line); color:#fff; font-family:'Press Start 2P',monospace; font-size:10px;
    padding:10px 16px; border-radius:6px; z-index:100; box-shadow:0 4px 10px rgba(0,0,0,.3);
    transition:opacity .3s, transform .3s;
  }
  .toast.hidden{ opacity:0; pointer-events:none; transform:translateX(-50%) translateY(10px); }

  .hint{ font-size:13px; color:#a07ba6; text-align:center; margin-top:6px; }

  @media (max-width:380px){
    .console{ padding:14px 10px 10px; border-radius:24px; }
    .screen{ min-height:400px; padding:12px 10px; }
    .home-title{ font-size:11px; }
    .lcd{ font-size:14px; padding:8px 12px; }
  }
</style>
</head>
<body>

<div id="bg-hearts"></div>

<div class="console">
  <div class="shell-top">
    <span class="brand">💕 OURSTORY 💕</span>
    <button class="icon-btn" id="settingsBtn" title="Settings">⚙️</button>
  </div>

  <div class="screen-frame">
    <div class="status-bar">
      <span id="dayCounter">DAY 000</span>
      <span id="heartBeat">💕</span>
    </div>

    <div class="screen" id="screen">
      <div class="scanlines"></div>

      <!-- HOME -->
      <section id="screen-home" class="screen-panel active">
        <h1 class="pix-title home-title">HAPPY 9TH<br>MONTHSARY!</h1>
        <p class="home-sub" id="homeSub">Partner 💕 You</p>

        <div class="mascot-scene">
          <div class="mascot him" id="mascotHim"></div>
          <span class="sparkle">✨</span>
          <div class="mascot her" id="mascotHer"></div>
        </div>

        <div class="lcd" id="dayCounterLcd">DAY 000</div>
        <div class="since-text" id="sinceText">together since --</div>

        <div class="stat-row">
          <div class="stat-chip"><b id="statMonths">0</b>months</div>
          <div class="stat-chip"><b id="statWeeks">0</b>weeks</div>
          <div class="stat-chip"><b id="statDays">0</b>days</div>
        </div>
        <p class="hint">tap ⚙️ to set your real start date &amp; names</p>
      </section>

      <!-- MUSIC -->
      <section id="screen-music" class="screen-panel">
        <h2 class="pix-label" style="text-align:center; margin-bottom:10px;">🎵 OUR PLAYLIST</h2>

        <div class="boombox">
          <div class="bb-handle"></div>
          <div class="bb-row">
            <div class="bb-speaker"></div>
            <div class="bb-window">
              <div class="eq paused" id="eq">
                <span></span><span></span><span></span><span></span><span></span>
              </div>
            </div>
            <div class="bb-speaker"></div>
          </div>
        </div>

        <div class="now-playing" id="nowPlaying">No song playing</div>
        <div class="player-controls">
          <button class="ctrl-btn" id="prevBtn">⏮</button>
          <button class="ctrl-btn play" id="playPauseBtn">▶</button>
          <button class="ctrl-btn" id="nextBtn">⏭</button>
        </div>
        <div class="vol-row">
          🔈<input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.8">🔊
        </div>

        <div class="add-row">
          <label class="pix-btn small" for="songInput">+ ADD SONG</label>
          <input type="file" id="songInput" accept="audio/*" multiple style="display:none">
        </div>

        <ul class="playlist" id="playlistEl"></ul>
        <p class="hint"></p>
      </section>

      <!-- ALBUMS -->
      <section id="screen-albums" class="screen-panel">
        <div id="albumListView">
          <h2 class="pix-label" style="text-align:center; margin-bottom:6px;">📸 OUR ALBUMS</h2>
          <div class="album-grid" id="albumGrid"></div>
        </div>

        <div id="albumDetailView" style="display:none;">
          <div class="album-detail-head">
            <button class="pix-btn small ghost" id="backToAlbums">← BACK</button>
            <button class="pix-btn small" id="addPhotosBtn">+ PHOTOS</button>
          </div>
          <h3 class="pix-title" id="albumDetailTitle" style="font-size:11px; text-align:center;"></h3>
          <input type="file" id="photoInput" accept="image/*" multiple style="display:none">
          <div class="photo-grid" id="photoGrid"></div>
        </div>
        <p class="hint"></p>
      </section>

      <!-- LETTER -->
      <section id="screen-letter" class="screen-panel">
        <h2 class="pix-label" style="text-align:center; margin-bottom:10px;">💌 LOVE LETTER</h2>
        <div class="parchment">
          <span class="seal">💗</span>
          <textarea id="letterText" placeholder="Write your letter here..."></textarea>
        </div>
        <div class="letter-foot">
          <button class="pix-btn small ghost" id="clearLetterBtn">CLEAR 🗑</button>
          <button class="pix-btn small" id="saveLetterBtn">SAVE 💾</button>
        </div>
      </section>

    </div>
  </div>

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="home">🏠<span>HOME</span></button>
    <button class="tab-btn" data-tab="music">🎵<span>MUSIC</span></button>
    <button class="tab-btn" data-tab="albums">📸<span>ALBUMS</span></button>
    <button class="tab-btn" data-tab="letter">💌<span>LETTER</span></button>
  </nav>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay hidden" id="settingsModal">
  <div class="modal-box">
    <h3>⚙️ SETTINGS</h3>
    <div class="field"><label>Your name</label><input type="text" id="inYourName"></div>
    <div class="field"><label>Partner's name</label><input type="text" id="inPartnerName"></div>
    <div class="field"><label>Together since</label><input type="date" id="inStartDate"></div>
    <div class="modal-actions">
      <button class="pix-btn small ghost" id="closeSettings">CANCEL</button>
      <button class="pix-btn small" id="saveSettingsBtn">SAVE</button>
    </div>
  </div>
</div>

<!-- NEW ALBUM MODAL -->
<div class="modal-overlay hidden" id="albumModal">
  <div class="modal-box">
    <h3>📁 NEW ALBUM</h3>
    <div class="field"><label>Album name</label><input type="text" id="inAlbumName" placeholder="e.g. Our First Trip"></div>
    <div class="field">
      <label>Pick an icon</label>
      <div class="emoji-pick" id="emojiPick"></div>
    </div>
    <div class="modal-actions">
      <button class="pix-btn small ghost" id="closeAlbumModal">CANCEL</button>
      <button class="pix-btn small" id="createAlbumBtn">CREATE</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="modal-overlay hidden" id="lightbox">
  <div class="modal-box">
    <img id="lightboxImg" src="" alt="photo">
    <div class="lb-controls">
      <button class="ctrl-btn" id="lbPrev">◀</button>
      <button class="ctrl-btn" id="lbDelete">🗑</button>
      <button class="ctrl-btn" id="lbNext">▶</button>
      <button class="ctrl-btn" id="lbClose">✕</button>
    </div>
  </div>
</div>

<div class="toast hidden" id="toast"></div>

<script>
/* ============================================================
   API CLIENT — talks to the Express + Postgres backend.
   Nothing here uses window.storage anymore: music, photos, and
   the letter are saved server-side, so they survive refreshes,
   redeploys, and different devices/browsers.
   ============================================================ */
const API = {
  async getSettings(){
    const r = await fetch('/api/settings');
    return r.ok ? r.json() : {};
  },
  async saveSettings(settings){
    await fetch('/api/settings', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(settings) });
  },
  async getLetter(){
    const r = await fetch('/api/letter');
    return r.ok ? r.json() : { content: null };
  },
  async saveLetter(content){
    await fetch('/api/letter', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ content }) });
  },
  async clearLetter(){
    await fetch('/api/letter', { method:'DELETE' });
  },
  async getSongs(){
    const r = await fetch('/api/songs');
    return r.ok ? r.json() : [];
  },
  async uploadSongs(files){
    const fd = new FormData();
    [...files].forEach(f => fd.append('songs', f));
    const r = await fetch('/api/songs', { method:'POST', body: fd });
    if(!r.ok) throw new Error('upload failed');
    return r.json();
  },
  async deleteSong(id){
    await fetch('/api/songs/' + id, { method:'DELETE' });
  },
  async getAlbums(){
    const r = await fetch('/api/albums');
    return r.ok ? r.json() : [];
  },
  async createAlbum(name, emoji){
    const r = await fetch('/api/albums', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ name, emoji }) });
    if(!r.ok) throw new Error('create album failed');
    return r.json();
  },
  async deleteAlbum(id){
    await fetch('/api/albums/' + id, { method:'DELETE' });
  },
  async getPhotos(albumId){
    const r = await fetch('/api/albums/' + albumId + '/photos');
    return r.ok ? r.json() : [];
  },
  async uploadPhotos(albumId, files){
    const fd = new FormData();
    [...files].forEach(f => fd.append('photos', f));
    const r = await fetch('/api/albums/' + albumId + '/photos', { method:'POST', body: fd });
    if(!r.ok) throw new Error('upload failed');
    return r.json();
  },
  async deletePhoto(id){
    await fetch('/api/photos/' + id, { method:'DELETE' });
  }
};

const MAX_FILE_BYTES = 15 * 1024 * 1024; // 15MB per file — must match server.js MAX_FILE_BYTES

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(showToast._tm);
  showToast._tm = setTimeout(()=> t.classList.add('hidden'), 1800);
}

/* ============================================================
   PIXEL ART ENGINE — renders a pattern of characters into a
   CSS grid of colored squares (classic 8-bit sprite look).
   ============================================================ */
function renderPixelGrid(container, pattern, colorMap, pixelSize){
  container.innerHTML = '';
  const cols = pattern[0].length;
  const rows = pattern.length;
  const grid = document.createElement('div');
  grid.className = 'pixel-grid';
  grid.style.gridTemplateColumns = `repeat(${cols}, ${pixelSize}px)`;
  grid.style.gridTemplateRows = `repeat(${rows}, ${pixelSize}px)`;
  pattern.forEach(row=>{
    [...row].forEach(ch=>{
      const cell = document.createElement('div');
      if(ch !== '.' && colorMap[ch]) cell.style.background = colorMap[ch];
      grid.appendChild(cell);
    });
  });
  container.appendChild(grid);
  container.style.width = (cols*pixelSize)+'px';
  container.style.height = (rows*pixelSize)+'px';
}

// 8x7 heart-face pattern shared by both mascots and the floating bg hearts
const HEART_PATTERN = [
  '.11..11.',
  '11111111',
  '11211211',
  '13111131',
  '.111111.',
  '..1111..',
  '...11...'
];
const HEART_PLAIN = [
  '.11..11.',
  '11111111',
  '11111111',
  '11111111',
  '.111111.',
  '..1111..',
  '...11...'
];
const BOW_PATTERN = [
  '.4.4.',
  '44444'

function paintMascots(){
  renderPixelGrid(document.getElementById('mascotHim'), HEART_PATTERN, {
    '1':'#6CA6E0', '2':'#2C3E66', '3':'#D9ECFF'

function spawnBgHearts(){
  const wrap = document.getElementById('bg-hearts');
  const colors = ['#FF9DBB', '#C9AEF0', '#FFD66B'];
  for(let i=0;i<16;i++){
    const holder = document.createElement('div');
    holder.className = 'bg-heart';
    const size = 2 + Math.random()*2.5;
    renderPixelGrid(holder, HEART_PLAIN, { '1': colors[i % colors.length] }, size);
    holder.style.left = Math.random()*100 + 'vw';
    holder.style.setProperty('--drift', (Math.random()*60-30)+'px');

function defaultStartDate(){
  const d = new Date();
  d.setMonth(d.getMonth() - 9);
  return d.toISOString().slice(0,10);
}

let settings = { yourName:'You', partnerName:'My Love', startDate: defaultStartDate() };

async function loadSettings(){
  const raw = await API.getSettings();
  if(raw && Object.keys(raw).length){
    settings = Object.assign({}, settings, raw);
  }
  document.getElementById('inYourName').value = settings.yourName;
  document.getElementById('inPartnerName').value = settings.partnerName;
  document.getElementById('inStartDate').value = settings.startDate;
  refreshHome();
}

async function saveSettings(){
  settings.yourName = document.getElementById('inYourName').value.trim() || 'You';
  settings.partnerName = document.getElementById('inPartnerName').value.trim() || 'My Love';
  settings.startDate = document.getElementById('inStartDate').value || defaultStartDate();
  await API.saveSettings(settings);
  refreshHome();
  closeModal('settingsModal');
  showToast('💾 Saved!');
}

function monthsWeeksDays(start, now){
  let months = (now.getFullYear()-start.getFullYear())*12 + (now.getMonth()-start.getMonth());
  const temp = new Date(start);
  temp.setMonth(temp.getMonth()+months);
  if(temp > now){ months--; temp.setMonth(temp.getMonth()-1); }
  const totalDays = Math.max(0, Math.floor((now-start)/(1000*60*60*24)));
  const weeks = Math.floor(totalDays/7);
  return { months: Math.max(0,months), weeks, totalDays };
}

function refreshHome(){
  document.getElementById('homeSub').textContent = `${settings.partnerName} 💕 ${settings.yourName}`;
  const start = new Date(settings.startDate + 'T00:00:00');
  const now = new Date();
  const { months, weeks, totalDays } = monthsWeeksDays(start, now);
  const label = `DAY ${totalDays}`;
  document.getElementById('dayCounter').textContent = label;
  document.getElementById('dayCounterLcd').textContent = label;
  document.getElementById('sinceText').textContent = 'together since ' + start.toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'});
  document.getElementById('statMonths').textContent = months;
  document.getElementById('statWeeks').textContent = weeks;
  document.getElementById('statDays').textContent = totalDays;
}

function switchTab(tab){
  document.querySelectorAll('.screen-panel').forEach(p=>p.classList.remove('active'));

/* ============================================================
   MUSIC PLAYER
   ============================================================ */
let playlist = []; // [{id, title}], audio bytes live on the server
let currentIndex = -1;
let pendingPlay = false;
const audioEl = new Audio();
audioEl.preload = 'auto';
audioEl.autoplay = false;

audioEl.addEventListener('waiting', ()=>{
  document.getElementById('nowPlaying').textContent = currentIndex === -1 ? 'Buffering...' : 'Loading ' + (playlist[currentIndex]?.title || 'track');
});

audioEl.addEventListener('playing', ()=>{
  pendingPlay = false;
  updatePlayerUI();
});

audioEl.addEventListener('canplay', ()=>{
  if (pendingPlay){
    audioEl.play().catch(()=>{});
    pendingPlay = false;
  }
  if (!audioEl.paused) updatePlayerUI();
});

audioEl.addEventListener('canplaythrough', ()=>{
  if (!audioEl.paused) updatePlayerUI();
});

audioEl.addEventListener('stalled', ()=>{
  showToast('⚠️ Network slow, buffering...');
});

audioEl.addEventListener('error', ()=>{
  showToast('⚠️ Audio playback error');
});

async function loadPlaylist(){
  playlist = await API.getSongs();
  renderPlaylist();
}

function renderPlaylist(){
  const el = document.getElementById('playlistEl');
  if(playlist.length === 0){
    el.innerHTML = '<div class="empty-state">No songs yet — add your song together! 🎶</div>';
    return;
  }
  el.innerHTML = '';
  playlist.forEach((song, idx)=>{
    const li = document.createElement('li');
    if(idx === currentIndex) li.classList.add('playing');
    li.innerHTML = `<span>${idx===currentIndex && !audioEl.paused ? '🎵' : '🎶'}</span><span class="t"></span>`;
    li.querySelector('.t').textContent = song.title;
    li.addEventListener('click', (e)=>{
      if(e.target.closest('button')) return;
      playSong(idx);
    });
    const del = document.createElement('button');
    del.textContent = '🗑';
    del.title = 'Delete song';
    del.addEventListener('click', async (e)=>{
      e.stopPropagation();
      if(!confirm(`Delete "${song.title}"? This can't be undone.`)) return;
      await removeSong(idx);
    });
    li.appendChild(del);
    el.appendChild(li);
  });
}

async function addSongFiles(files){
  const valid = [];
  for(const file of files){
    if(file.size > MAX_FILE_BYTES){
      showToast('⚠️ ' + file.name + ' too big, skipped');
      continue;
    }
    valid.push(file);
  }
  if(valid.length === 0) return;
  try{
    const added = await API.uploadSongs(valid);
    playlist = playlist.concat(added);
    renderPlaylist();
    showToast('🎵 Song added!');
  }catch(e){
    showToast('⚠️ Upload failed, try again');
  }
}

async function removeSong(idx){
  const song = playlist[idx];
  if(!song) return;
  await API.deleteSong(song.id);
  if(idx === currentIndex){
    audioEl.pause();
    audioEl.src = '';
    currentIndex = -1;
    updatePlayerUI();
  } else if(idx < currentIndex){
    currentIndex--;
  }
  playlist.splice(idx,1);
  renderPlaylist();
  showToast('🗑️ Song removed');
}

function playSong(idx){
  if(idx < 0 || idx >= playlist.length) return;
  currentIndex = idx;
  pendingPlay = true;
  audioEl.pause();
  audioEl.src = '/api/songs/' + playlist[idx].id + '/stream';
  audioEl.load();
  audioEl.play().catch(()=>{});
  updatePlayerUI();
  renderPlaylist();
}

function togglePlayPause(){
  if(currentIndex === -1){
    if(playlist.length > 0) playSong(0);
    return;
  }
  if(audioEl.paused){ audioEl.play().catch(()=>{}); }
  else{ audioEl.pause(); }
  updatePlayerUI();
}

function nextSong(){
  if(playlist.length === 0) return;
  const next = currentIndex < 0 ? 0 : (currentIndex + 1) % playlist.length;
  playSong(next);
}
function prevSong(){
  if(playlist.length === 0) return;
  const prev = currentIndex <= 0 ? playlist.length - 1 : currentIndex - 1;
  playSong(prev);
}

function updatePlayerUI(){
  const playing = currentIndex !== -1 && !audioEl.paused;
  document.getElementById('playPauseBtn').textContent = playing ? '⏸' : '▶';
  document.getElementById('nowPlaying').textContent = currentIndex === -1 ? 'No song playing' : playlist[currentIndex].title;
  document.getElementById('eq').classList.toggle('paused', !playing);
}

audioEl.addEventListener('ended', nextSong);
audioEl.addEventListener('pause', updatePlayerUI);
audioEl.addEventListener('play', updatePlayerUI);

/* ============================================================
   ALBUMS + PHOTOS
   ============================================================ */
let albums = [];
let currentAlbumId = null;
let currentPhotos = []; // [{id}] for the open album
let pickedEmoji = '💕';
const EMOJI_CHOICES = ['💕','📍','🎂','✈️','🎉','🌸','📷','🎮','🏖️','🍰'];

async function loadAlbums(){
  albums = await API.getAlbums();
  renderAlbumList();
}

function renderAlbumList(){
  const grid = document.getElementById('albumGrid');
  grid.innerHTML = '';
  albums.forEach(album=>{
    const card = document.createElement('div');
    card.className = 'album-card';
    card.innerHTML = `<div class="emo">${album.emoji}</div><span class="nm"></span><span class="ct">${album.photoCount} photos</span>`;
    card.querySelector('.nm').textContent = album.name;
    card.addEventListener('click', ()=> openAlbum(album.id));

    const del = document.createElement('button');
    del.className = 'album-del';
    del.textContent = '🗑';
    del.title = 'Delete album';
    del.addEventListener('click', async (e)=>{
      e.stopPropagation();
      if(!confirm(`Delete album "${album.name}" and all its photos? This can't be undone.`)) return;
      await API.deleteAlbum(album.id);
      albums = albums.filter(a=>a.id!==album.id);
      renderAlbumList();
      showToast('🗑️ Album deleted');
    });
    card.appendChild(del);

    grid.appendChild(card);
  });
  const newCard = document.createElement('div');
  newCard.className = 'album-card new';
  newCard.innerHTML = `<div style="font-size:22px;">+</div><span class="nm">New Album</span>`;
  newCard.addEventListener('click', openNewAlbumModal);
  grid.appendChild(newCard);
}

function openNewAlbumModal(){
  pickedEmoji = EMOJI_CHOICES[0];
  const pick = document.getElementById('emojiPick');
  pick.innerHTML = '';
  EMOJI_CHOICES.forEach(e=>{
    const b = document.createElement('button');
    b.textContent = e;
    if(e===pickedEmoji) b.classList.add('sel');
    b.addEventListener('click', ()=>{
      pickedEmoji = e;
      pick.querySelectorAll('button').forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel');
    });
    pick.appendChild(b);
  });
  document.getElementById('inAlbumName').value = '';
  openModal('albumModal');
}

async function createAlbum(){
  const name = document.getElementById('inAlbumName').value.trim();
  if(!name){ showToast('⚠️ Give it a name!'); return; }
  try{
    const album = await API.createAlbum(name, pickedEmoji);
    albums.push(album);
    renderAlbumList();
    closeModal('albumModal');
    showToast('📁 Album created!');
  }catch(e){
    showToast('⚠️ Could not create album');
  }
}

async function openAlbum(id){
  currentAlbumId = id;
  const album = albums.find(a=>a.id===id);
  if(!album) return;
  document.getElementById('albumListView').style.display = 'none';
  document.getElementById('albumDetailView').style.display = 'block';
  document.getElementById('albumDetailTitle').textContent = album.emoji + ' ' + album.name;
  currentPhotos = await API.getPhotos(id);
  renderPhotoGrid();
}

function closeAlbum(){
  document.getElementById('albumListView').style.display = 'block';
  document.getElementById('albumDetailView').style.display = 'none';
  currentAlbumId = null;
  loadAlbums();
}

function renderPhotoGrid(){
  const grid = document.getElementById('photoGrid');
  grid.innerHTML = '';
  if(currentPhotos.length === 0){
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;">No photos yet — add your first memory! 💝</div>';
    return;
  }
  currentPhotos.forEach((p, i)=>{
    const thumb = document.createElement('div');
    thumb.className = 'photo-thumb';
    thumb.style.transform = `rotate(${(Math.random()*8-4).toFixed(1)}deg)`;
    const img = document.createElement('img');
    img.loading = 'lazy';
    img.src = '/api/photos/' + p.id + '/file';
    thumb.appendChild(img);
    thumb.addEventListener('click', ()=> openLightbox(i));
    grid.appendChild(thumb);
  });
}

async function addPhotosToCurrentAlbum(files){
  if(!currentAlbumId) return;
  const valid = [];
  for(const file of files){
    if(file.size > MAX_FILE_BYTES){
      showToast('⚠️ ' + file.name + ' too big, skipped');
      continue;
    }
    valid.push(file);
  }
  if(valid.length === 0) return;
  try{
    const added = await API.uploadPhotos(currentAlbumId, valid);
    currentPhotos = currentPhotos.concat(added);
    renderPhotoGrid();
    const album = albums.find(a=>a.id===currentAlbumId);
    if(album) album.photoCount += added.length;
    showToast('📸 Photos added!');
  }catch(e){
    showToast('⚠️ Upload failed, try again');
  }
}

/* ---------- lightbox ---------- */
let lbIndex = 0;
function openLightbox(idx){
  lbIndex = idx;
  showLightboxImage();
  openModal('lightbox');
}
function showLightboxImage(){
  if(currentPhotos.length === 0) return;
  document.getElementById('lightboxImg').src = '/api/photos/' + currentPhotos[lbIndex].id + '/file';
}
function lbNav(dir){
  if(currentPhotos.length === 0) return;
  lbIndex = (lbIndex + dir + currentPhotos.length) % currentPhotos.length;
  showLightboxImage();
}
async function lbDeletePhoto(){
  if(currentPhotos.length === 0) return;
  if(!confirm('Delete this photo? This can\'t be undone.')) return;
  const photo = currentPhotos[lbIndex];
  await API.deletePhoto(photo.id);
  currentPhotos.splice(lbIndex,1);
  const album = albums.find(a=>a.id===currentAlbumId);
  if(album) album.photoCount = Math.max(0, album.photoCount - 1);
  renderPhotoGrid();
  if(currentPhotos.length === 0){ closeModal('lightbox'); }
  else{ lbIndex = lbIndex % currentPhotos.length; showLightboxImage(); }
  showToast('🗑️ Photo removed');
}
